<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vanguard Procurement Limited</title>
  <meta name="description" content="Vanguard Procurement Limited website under construction." />
  <style>
    :root {
      --bg: #07111f;
      --bg-soft: #0d1b2e;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-border: rgba(255, 255, 255, 0.16);
      --text: #f5f7fb;
      --muted: #b9c4d3;
      --accent: #5ea3ff;
      --accent-soft: rgba(94, 163, 255, 0.18);
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(94, 163, 255, 0.16), transparent 32%),
        radial-gradient(circle at 80% 30%, rgba(94, 163, 255, 0.10), transparent 28%),
        linear-gradient(160deg, var(--bg) 0%, #091525 45%, var(--bg-soft) 100%);
      color: var(--text);
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
      position: relative;
      isolation: isolate;
    }

    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(circle at center, black 45%, transparent 88%);
      opacity: 0.45;
      animation: drift 18s linear infinite;
      pointer-events: none;
      z-index: -2;
    }

    .orb {
      position: absolute;
      border-radius: 999px;
      filter: blur(8px);
      opacity: 0.65;
      pointer-events: none;
      z-index: -1;
    }

    .orb.one {
      width: 280px;
      height: 280px;
      top: 10%;
      left: 8%;
      background: radial-gradient(circle, rgba(94, 163, 255, 0.40), transparent 70%);
      animation: floatOne 12s ease-in-out infinite;
    }

    .orb.two {
      width: 360px;
      height: 360px;
      right: 5%;
      bottom: 8%;
      background: radial-gradient(circle, rgba(94, 163, 255, 0.24), transparent 72%);
      animation: floatTwo 14s ease-in-out infinite;
    }

    .card {
      width: min(720px, 100%);
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 48px 40px;
      position: relative;
      animation: fadeUp 1s ease-out both;
    }

    .topline {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--accent-soft);
      border: 1px solid rgba(94, 163, 255, 0.24);
      color: #dce9ff;
      font-size: 0.9rem;
      letter-spacing: 0.02em;
      margin-bottom: 22px;
    }

    .pulse {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 0 rgba(94, 163, 255, 0.7);
      animation: pulse 2s infinite;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 5vw, 4rem);
      line-height: 1.02;
      letter-spacing: -0.04em;
      max-width: 10ch;
    }

    p {
      margin: 22px 0 0;
      font-size: clamp(1rem, 2vw, 1.15rem);
      line-height: 1.75;
      color: var(--muted);
      max-width: 56ch;
    }

    .brand {
      margin-top: 32px;
      display: flex;
      align-items: center;
      gap: 14px;
      color: #eef4ff;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: linear-gradient(145deg, rgba(94, 163, 255, 0.95), rgba(94, 163, 255, 0.35));
      display: grid;
      place-items: center;
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.28), 0 10px 24px rgba(94, 163, 255, 0.22);
      font-size: 1rem;
      font-weight: 700;
      color: #03111e;
    }

    .footer-note {
      margin-top: 24px;
      font-size: 0.92rem;
      color: rgba(245, 247, 251, 0.72);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(94, 163, 255, 0.65);
      }
      70% {
        box-shadow: 0 0 0 14px rgba(94, 163, 255, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(94, 163, 255, 0);
      }
    }

    @keyframes drift {
      0% { transform: translate3d(0, 0, 0); }
      50% { transform: translate3d(12px, 8px, 0); }
      100% { transform: translate3d(0, 0, 0); }
    }

    @keyframes floatOne {
      0%, 100% { transform: translateY(0px) translateX(0px); }
      50% { transform: translateY(18px) translateX(12px); }
    }

    @keyframes floatTwo {
      0%, 100% { transform: translateY(0px) translateX(0px); }
      50% { transform: translateY(-18px) translateX(-10px); }
    }

    @media (max-width: 640px) {
      .card {
        padding: 34px 24px;
        border-radius: 22px;
      }

      .brand {
        align-items: flex-start;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behaviour: auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="grid" aria-hidden="true"></div>
  <div class="orb one" aria-hidden="true"></div>
  <div class="orb two" aria-hidden="true"></div>

  <main class="card" role="main">
    <div class="topline">
      <span class="pulse" aria-hidden="true"></span>
      New website in development
    </div>

    <h1>Website under construction.</h1>
    <p>
      Thank you for visiting Vanguard Procurement Limited. Our website is currently being refined and will be available soon.
      Please come back later.
    </p>

    <div class="brand" aria-label="Vanguard Procurement Limited">
      <div class="brand-mark">VP</div>
      <div>Vanguard Procurement Limited</div>
    </div>

    <div class="footer-note">Professional procurement consultancy</div>
  </main>
</body>
</html>
